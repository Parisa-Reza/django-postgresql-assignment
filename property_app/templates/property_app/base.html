<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Rental</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --brand-dark-blue: #003566;
            --brand-mint: #00cca3;
            --brand-mint-hover: #00b38f;
        }

        body {
            background-color: #f8f9fa;
        }

        .custom-navbar {
            background-color: var(--brand-dark-blue) !important;
            padding: 15px 0;
        }

        .hero-section {
            background: #ffffff;
            padding: 40px 0;
            border-bottom: 1px solid #e9ecef;
        }


        .btn-search-stays {
            background-color: var(--brand-mint) !important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.95rem;
            padding: 10px 20px;
            display-inline-flex: align-items-center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s ease-in-out;
            width: 100%;
        }

        .btn-search-stays:hover {
            background-color: var(--brand-mint-hover) !important;
        }

        .search-box-input {
            border-radius: 8px !important;
            padding: 11px 15px !important;
            border: 1px solid #ced4da;
        }

        .search-box-input:focus {
            border-color: var(--brand-dark-blue);
            box-shadow: 0 0 0 0.2rem rgba(0, 53, 102, 0.25);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Rental Owner</a>
            <a class="btn btn-outline-light btn-sm px-3 rounded-pill fw-medium" href="{% url 'admin:index' %}"
                target="_blank"> Admin Panel</a>
        </div>
        </div>
    </nav>

    <div class="container my-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-light text-center py-4 border-top mt-5">
        <p class="text-muted mb-0">Rental Owner &copy; 2026</p>
    </footer>
</body>

</html>
