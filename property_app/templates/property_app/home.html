{% extends 'property_app/base.html' %}

{% block content %}
<div class="hero-section text-center rounded mb-5 shadow-sm p-5 bg-white">
    <div class="container">
        <h1 class="display-5 fw-bold text-dark">Vacation Rentals are Yours to Discover</h1>
        <p class="lead text-muted">Compare & Book Vacation Rentals.</p>
    </div>
</div>

<div class="card shadow border-0 p-4 bg-white rounded-3">
    <h5 class="mb-4 text-dark fw-bold">Search Destination Properties</h5>
    <form method="GET" action="{% url 'property_listing' %}">
        <div class="row g-3 align-items-center">
            <div class="col-md-9">
                <input type="text" name="q" class="form-control search-box-input" placeholder="Where do you want to go?"
                    aria-label="Property Search Field">
            </div>

            <div class="col-md-3">
                <button type="submit" class="btn btn-search-stays">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        class="bi bi-search" viewBox="0 0 16 16" style="vertical-align: -2px;">
                        <path
                            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                    </svg>
                    Search Stays
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
