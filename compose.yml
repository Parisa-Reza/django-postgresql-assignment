services:
  db:
    image: postgres:17
    container_name: postgres-postgis-pgvector
    entrypoint: >
      sh -c "apt-get update && apt-get install -y postgresql-17-postgis-3 postgresql-17-postgis-3-scripts postgresql-17-pgvector && docker-entrypoint.sh postgres"
    # Docker will inject the database credentials from the .env file here
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 15

  web:
    build: .
    container_name: geodjango-app
    command: python manage.py runserver 0.0.0.0:8000
    # Docker injects the environment variables into the Django container
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: